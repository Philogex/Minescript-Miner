name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes g++ libboost-dev

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build package and run tests
        run: scripts/run-tests.sh

  linux-wheel:
    name: Build manylinux wheel
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - test
      - performance
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Prepare release tag
        id: release
        run: echo "tag=$(python tools/release_tag.py "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - name: Build wheel
        run: python -m cibuildwheel --platform linux --output-dir wheelhouse

      - name: Build Minescript bundle
        run: python tools/build_minescript_bundle.py wheelhouse/*.whl "dist/minescript-miner-linux-${{ steps.release.outputs.tag }}.zip"

      - name: Verify Minescript bundle
        run: |
          rm -rf build/bundle-check
          python -m zipfile -e "dist/minescript-miner-linux-${{ steps.release.outputs.tag }}.zip" build/bundle-check
          MINESCRIPT_MINER_NATIVE_LOG=build/bundle-check/native.log \
            python -I -c "import sys; sys.path[:0] = ['build/bundle-check/Minescript-Miner', 'build/bundle-check/Minescript-Miner/src']; import _minescript_miner_native as native; import minescript_miner; assert native.hello() == minescript_miner.hello() == 'hello from native extension'; assert minescript_miner.geometry_catalog_debug()['version'] == 1; assert minescript_miner.acquire_target((0.5, 64.5, 0.5), (90.0, 10.0), 1, 3, 4.8, [0] * 27, []) is None"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minescript-miner-linux-${{ steps.release.outputs.tag }}
          path: |
            wheelhouse/*.whl
            dist/minescript-miner-linux-${{ steps.release.outputs.tag }}.zip
          if-no-files-found: error

  windows-wheel:
    name: Build Windows wheel
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - test
      - performance
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Boost headers
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install boost-integer:x64-windows boost-multiprecision:x64-windows boost-rational:x64-windows
          "BOOST_INCLUDEDIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\include" >> $env:GITHUB_ENV

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel abi3audit

      - name: Prepare release tag
        id: release
        shell: pwsh
        run: |
          $tag = python tools/release_tag.py $env:GITHUB_REF_NAME
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build wheel
        run: python -m cibuildwheel --platform windows --output-dir wheelhouse

      - name: Verify ABI3 wheel on Python 3.12
        shell: pwsh
        run: |
          $wheel = Get-ChildItem wheelhouse/*.whl | Select-Object -First 1
          if ($wheel.Name -notmatch "-cp39-abi3-win_amd64\.whl$") {
            throw "Expected a cp39-abi3-win_amd64 wheel, got $($wheel.Name)"
          }
          abi3audit $wheel.FullName
          Remove-Item -Recurse -Force build/wheel-check -ErrorAction SilentlyContinue
          python -m pip install --no-deps --target build/wheel-check $wheel.FullName
          $env:MINESCRIPT_MINER_NATIVE_LOG = "build/wheel-check/native.log"
          python -I -c "import sys; sys.path.insert(0, 'build/wheel-check'); import _minescript_miner_native as native; import minescript_miner; assert native.hello() == minescript_miner.hello() == 'hello from native extension'; assert minescript_miner.geometry_catalog_debug()['version'] == 1"

      - name: Build Minescript bundle
        shell: pwsh
        run: |
          $wheel = Get-ChildItem wheelhouse/*.whl | Select-Object -First 1
          python tools/build_minescript_bundle.py $wheel.FullName "dist/minescript-miner-windows-${{ steps.release.outputs.tag }}.zip"

      - name: Verify Minescript bundle
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build/bundle-check -ErrorAction SilentlyContinue
          python -m zipfile -e "dist/minescript-miner-windows-${{ steps.release.outputs.tag }}.zip" build/bundle-check
          $env:MINESCRIPT_MINER_NATIVE_LOG = "build/bundle-check/native.log"
          Get-ChildItem build/bundle-check/Minescript-Miner -Recurse
          python -I -c "import importlib.machinery, importlib.util, pathlib, sys; root=pathlib.Path('build/bundle-check/Minescript-Miner').resolve(); sys.path[:0] = [str(root), str(root / 'src')]; print(importlib.machinery.EXTENSION_SUFFIXES); print(importlib.util.find_spec('_minescript_miner_native')); import _minescript_miner_native as native; import minescript_miner; assert native.hello() == minescript_miner.hello() == 'hello from native extension'; assert minescript_miner.geometry_catalog_debug()['version'] == 1; assert minescript_miner.acquire_target((0.5, 64.5, 0.5), (90.0, 10.0), 1, 3, 4.8, [0] * 27, []) is None"

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minescript-miner-windows-${{ steps.release.outputs.tag }}
          path: |
            wheelhouse/*.whl
            dist/minescript-miner-windows-${{ steps.release.outputs.tag }}.zip
          if-no-files-found: error

  performance:
    name: Record performance metadata
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install profiling dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes g++ libboost-dev valgrind

      - name: Prepare release tag
        id: release
        run: echo "tag=$(python tools/release_tag.py "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - name: Run Callgrind benchmark
        run: scripts/run-performance-report.sh "${{ steps.release.outputs.tag }}" build/profile/report

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: minescript-miner-performance-${{ steps.release.outputs.tag }}
          path: |
            build/profile/report/performance-report.json
            build/profile/report/benchmark-output.txt
            build/profile/report/callgrind-annotate.txt
            build/profile/report/callgrind.out
          if-no-files-found: error
