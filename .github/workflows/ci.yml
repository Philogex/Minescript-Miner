name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes g++

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build package and run tests
        run: scripts/run-tests.sh

  windows-build-test:
    name: Test Windows native build
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel --outdir wheelhouse

      - name: Verify native extension
        shell: pwsh
        run: |
          $wheel = Get-ChildItem wheelhouse/*.whl | Select-Object -First 1
          python -m pip install --no-deps --target build/wheel-check $wheel.FullName
          python -I -c "import sys; sys.path.insert(0, 'build/wheel-check'); import _minescript_miner_native as native; from minescript_miner.adapter.shape_catalog import SHAPE_CATALOG_VERSION; debug = native.geometry_catalog_debug(); assert native.hello() == 'hello from native extension'; assert debug['shape_catalog_version'] == SHAPE_CATALOG_VERSION; assert debug['geometry_catalog_version'] >= SHAPE_CATALOG_VERSION"

  linux-wheel:
    name: Build manylinux wheel
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - test
      - windows-build-test
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Prepare release tag
        id: release
        run: echo "tag=$(python tools/release_tag.py "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - name: Build wheel
        run: python -m cibuildwheel --platform linux --output-dir wheelhouse

      - name: Build Minescript bundle
        run: python tools/build_minescript_bundle.py wheelhouse/*.whl "dist/minescript-miner-linux-${{ steps.release.outputs.tag }}.zip"

      - name: Verify Minescript bundle
        run: |
          rm -rf build/bundle-check
          python -m zipfile -e "dist/minescript-miner-linux-${{ steps.release.outputs.tag }}.zip" build/bundle-check
          MINESCRIPT_MINER_NATIVE_LOG=build/bundle-check/native.log \
            python -I -c "import sys; sys.path[:0] = ['build/bundle-check/Minescript-Miner', 'build/bundle-check/Minescript-Miner/src']; import _minescript_miner_native as native; import minescript_miner; from minescript_miner.adapter.shape_catalog import SHAPE_CATALOG_VERSION; debug = minescript_miner.geometry_catalog_debug(); assert native.hello() == minescript_miner.hello() == 'hello from native extension'; assert debug['shape_catalog_version'] == SHAPE_CATALOG_VERSION; assert debug['geometry_catalog_version'] >= SHAPE_CATALOG_VERSION; assert minescript_miner.acquire_target((0.5, 64.5, 0.5), (90.0, 10.0), SHAPE_CATALOG_VERSION, 3, 4.8, [0] * 27, []) is None"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: minescript-miner-linux-${{ steps.release.outputs.tag }}
          path: |
            wheelhouse/*.whl
            dist/minescript-miner-linux-${{ steps.release.outputs.tag }}.zip
          if-no-files-found: error

  windows-wheel:
    name: Build Windows wheel
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - test
      - windows-build-test
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel abi3audit

      - name: Prepare release tag
        id: release
        shell: pwsh
        run: |
          $tag = python tools/release_tag.py $env:GITHUB_REF_NAME
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build wheel
        run: python -m cibuildwheel --platform windows --output-dir wheelhouse

      - name: Verify ABI3 wheel on Python 3.12
        shell: pwsh
        run: |
          $wheel = Get-ChildItem wheelhouse/*.whl | Select-Object -First 1
          if ($wheel.Name -notmatch "-cp39-abi3-win_amd64\.whl$") {
            throw "Expected a cp39-abi3-win_amd64 wheel, got $($wheel.Name)"
          }
          abi3audit $wheel.FullName
          Remove-Item -Recurse -Force build/wheel-check -ErrorAction SilentlyContinue
          python -m pip install --no-deps --target build/wheel-check $wheel.FullName
          $env:MINESCRIPT_MINER_NATIVE_LOG = "build/wheel-check/native.log"
          python -I -c "import sys; sys.path.insert(0, 'build/wheel-check'); import _minescript_miner_native as native; import minescript_miner; from minescript_miner.adapter.shape_catalog import SHAPE_CATALOG_VERSION; debug = minescript_miner.geometry_catalog_debug(); assert native.hello() == minescript_miner.hello() == 'hello from native extension'; assert debug['shape_catalog_version'] == SHAPE_CATALOG_VERSION; assert debug['geometry_catalog_version'] >= SHAPE_CATALOG_VERSION"

      - name: Build Minescript bundle
        shell: pwsh
        run: |
          $wheel = Get-ChildItem wheelhouse/*.whl | Select-Object -First 1
          python tools/build_minescript_bundle.py $wheel.FullName "dist/minescript-miner-windows-${{ steps.release.outputs.tag }}.zip"

      - name: Verify Minescript bundle
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build/bundle-check -ErrorAction SilentlyContinue
          python -m zipfile -e "dist/minescript-miner-windows-${{ steps.release.outputs.tag }}.zip" build/bundle-check
          $env:MINESCRIPT_MINER_NATIVE_LOG = "build/bundle-check/native.log"
          Get-ChildItem build/bundle-check/Minescript-Miner -Recurse
          python -I -c "import importlib.machinery, importlib.util, pathlib, sys; root=pathlib.Path('build/bundle-check/Minescript-Miner').resolve(); sys.path[:0] = [str(root), str(root / 'src')]; print(importlib.machinery.EXTENSION_SUFFIXES); print(importlib.util.find_spec('_minescript_miner_native')); import _minescript_miner_native as native; import minescript_miner; from minescript_miner.adapter.shape_catalog import SHAPE_CATALOG_VERSION; debug = minescript_miner.geometry_catalog_debug(); assert native.hello() == minescript_miner.hello() == 'hello from native extension'; assert debug['shape_catalog_version'] == SHAPE_CATALOG_VERSION; assert debug['geometry_catalog_version'] >= SHAPE_CATALOG_VERSION; assert minescript_miner.acquire_target((0.5, 64.5, 0.5), (90.0, 10.0), SHAPE_CATALOG_VERSION, 3, 4.8, [0] * 27, []) is None"

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: minescript-miner-windows-${{ steps.release.outputs.tag }}
          path: |
            wheelhouse/*.whl
            dist/minescript-miner-windows-${{ steps.release.outputs.tag }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - linux-wheel
      - windows-wheel
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: minescript-miner-*
          path: release-assets

      - name: Create release or upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -d '' assets < <(find release-assets -type f -print0)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found." >&2
            exit 1
          fi

          printf 'Release asset: %s\n' "${assets[@]}"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --generate-notes \
              --verify-tag
          fi
